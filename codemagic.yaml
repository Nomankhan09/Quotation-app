workflows:
  ios-test-build:
    name: iOS Test Build

    max_build_duration: 60

    environment:
      node: 18
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace ios/quote-app.xcworkspace \
            --scheme quote-app

    artifacts:
      - build/ios/ipa/*.ipa